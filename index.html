<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>Landing Page Simples</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="landing-pai">

      <section class="lado-esquerdo">

        <header class="logo-area">
        <img>
          <h1>Curso do Piruelo</h1>
        </header>

        <article class="content">
          <h2>Ganhe o melhor<br />treinamento culinário GRATUITO!</h2>
          <p class="texto">
            Um curso prático para transformar sua paixão em receitas de bolo
            perfeitas, testadas e aprovadas por muitas pessoas.
          </p>
        </article>

        <form class="dados">
          <input type="text" placeholder="Seu Nome" />
          <input type="email" placeholder="Seu Telefone" />
          <button type="submit">MATRICULAR-SE</button>
        </form>
      </section>

      <section class="lado-direito">
        <img class="coz" src="piruelo.png" alt="Piruelo" />
      </section>
    </main>
  </body>
</html>
